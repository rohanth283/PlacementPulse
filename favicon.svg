<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
    <!-- iOS style rounded background rect -->
    <rect width="32" height="32" rx="9" fill="#161617" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    
    <!-- Gradient definition -->
    <defs>
        <linearGradient id="apple-blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="55%" stop-color="#0a84ff"/>
            <stop offset="100%" stop-color="#0056b3"/>
